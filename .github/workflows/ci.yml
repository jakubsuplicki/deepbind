name: CI / CD

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # Backend — build & test
  # ─────────────────────────────────────────────
  backend:
    name: Backend — pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: backend/requirements.txt

      - name: Install dependencies
        # --override forces python-dotenv 1.2.2 over litellm's transitive
        # ==1.0.1 pin to eliminate CVE-2026-28684. See backend/overrides.txt.
        run: uv pip install --system --override overrides.txt -r requirements.txt

      - name: Download spaCy models
        # Retry 3x with backoff to ride out transient GitHub 5xx errors when
        # fetching model wheels from github.com/explosion/spacy-models releases.
        # Don't fail the build if downloads still error — tests that need NER
        # should skip via JARVIS_SKIP_NER=1; entity_extraction handles missing
        # models gracefully.
        env:
          PIP_DEFAULT_TIMEOUT: '120'
        run: |
          set +e
          for model in pl_core_news_sm en_core_web_sm; do
            for attempt in 1 2 3; do
              echo "::group::spacy download $model (attempt $attempt)"
              python -m spacy download "$model" && { echo "::endgroup::"; break; }
              echo "::endgroup::"
              echo "spaCy download of $model failed (attempt $attempt), retrying in $((attempt * 10))s..."
              sleep $((attempt * 10))
            done
          done
          # Verify at least the English model is available; if not, log warning
          # but continue — most tests don't need spaCy NER.
          python -c "import spacy; spacy.load('en_core_web_sm')" 2>/dev/null \
            && echo "spaCy en_core_web_sm OK" \
            || echo "::warning::spaCy en_core_web_sm unavailable — NER-dependent tests may skip"
          exit 0

      - name: Prepare test workspace
        run: mkdir -p /tmp/jarvis-ci/memory /tmp/jarvis-ci/app/sessions /tmp/jarvis-ci/graph /tmp/jarvis-ci/agents

      - name: Run tests
        env:
          JARVIS_DISABLE_EMBEDDINGS: '1'
          JARVIS_WORKSPACE_PATH: /tmp/jarvis-ci
          ANTHROPIC_API_KEY: sk-ant-dummy-ci-key
        run: pytest --tb=short -q

  # ─────────────────────────────────────────────
  # Frontend — build & test
  # ─────────────────────────────────────────────
  frontend:
    name: Frontend — build + vitest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify lockfile integrity
        run: |
          # npm ci should not produce any modifications to the lock file.
          # If it does, the committed lock file is out of sync.
          npm install --package-lock-only
          if ! git diff --quiet -- package-lock.json; then
            echo "::error::package-lock.json is out of sync with package.json — run 'npm install' locally and commit the updated lock file"
            git diff -- package-lock.json | head -40
            exit 1
          fi

      - name: Build (nuxt build)
        run: npm run build

      - name: Run tests (vitest)
        run: npm test

  # ─────────────────────────────────────────────
  # Release Please — Google-style versioning
  # Runs only on push to main, after CI passes
  # ─────────────────────────────────────────────
  release:
    name: Release Please
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

