name: Dependency Audit

# Scans Python + npm dependencies for known CVEs. No auto-bumps, no PRs.
# Fails the build only on HIGH / CRITICAL findings so low-severity noise in
# deep transitive deps doesn't block merges.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Daily at 06:00 UTC — picks up newly published advisories against the
    # current pinned dependencies without requiring a code change.
    - cron: '0 6 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────
  # Backend — pip-audit against installed venv
  # ─────────────────────────────────────────────
  pip-audit:
    name: Backend — pip-audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: backend/requirements.txt

      - name: Install dependencies into isolated venv
        # uv venv does NOT include pip as a package (unlike python -m venv).
        # Result: a clean runtime venv with every app dep installed and pip
        # absent. ADR 015 dropped litellm and its CVE-driven dotenv override.
        env:
          VIRTUAL_ENV: /tmp/jarvis-venv
        run: |
          uv venv $VIRTUAL_ENV
          uv pip install -r requirements.txt

      - name: Install pip-audit
        run: uv pip install --system pip-audit

      - name: Run pip-audit (fail on ANY runtime vulnerability)
        # --path reads installed package metadata via importlib.metadata;
        # pip's resolver is never invoked. uv venvs exclude pip itself, so
        # CVE-2026-3219 (pip 26.0.1, no upstream patch) is correctly absent.
        # Strict mode: any known CVE in the runtime dep tree fails the build.
        # No --ignore-vuln allowlist — fix the dep if a finding appears.
        run: pip-audit --path /tmp/jarvis-venv --vulnerability-service osv --desc --strict

  # ─────────────────────────────────────────────
  # Frontend — npm audit against package-lock.json
  # ─────────────────────────────────────────────
  npm-audit:
    name: Frontend — npm audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Run npm audit (fail on HIGH / CRITICAL, with a scoped allowlist)
        # Fail on any high/critical advisory in production deps EXCEPT a
        # documented allowlist of build-tooling-only advisories that do not
        # affect the shipped artifact. esbuild is a build-time dependency
        # (pulled via vite / nitropack / @nuxt devtools) — it is not in the
        # runtime bundle that ships to users.
        #
        # Allowlisted:
        #   GHSA-gv7w-rqvm-qjhr — esbuild: missing binary integrity check in
        #     the *Deno* install path (RCE via NPM_CONFIG_REGISTRY). We don't
        #     use Deno, and esbuild is build-only. npm cannot bump it without
        #     `--force`, which destructively downgrades Nuxt to 2.x. Remove
        #     this entry once Nuxt/vite upstream pins a patched esbuild.
        #
        # --omit=dev ignores devDependencies (they don't ship to users).
        run: |
          ALLOWLIST="GHSA-gv7w-rqvm-qjhr"
          node -e '
            const cp = require("child_process");
            const allow = new Set(process.env.ALLOWLIST.split(/\s+/).filter(Boolean));
            let report;
            try {
              report = cp.execSync("npm audit --omit=dev --json", { encoding: "utf8" });
            } catch (e) {
              // npm audit exits non-zero when vulnerabilities exist; the JSON
              // is still on stdout.
              report = e.stdout;
            }
            const data = JSON.parse(report);
            const offenders = [];
            for (const [name, v] of Object.entries(data.vulnerabilities || {})) {
              if (v.severity !== "high" && v.severity !== "critical") continue;
              for (const via of v.via || []) {
                if (typeof via !== "object") continue;
                if (via.severity !== "high" && via.severity !== "critical") continue;
                const ghsa = (via.url || "").split("/").pop();
                if (allow.has(ghsa)) continue;
                offenders.push(`${via.name}: ${via.title} (${ghsa})`);
              }
            }
            const unique = [...new Set(offenders)];
            if (unique.length) {
              console.error("::error::Non-allowlisted high/critical advisories found:");
              for (const o of unique) console.error("  - " + o);
              process.exit(1);
            }
            const allowed = Object.values(data.vulnerabilities || {})
              .filter(v => v.severity === "high" || v.severity === "critical").length;
            console.log(`npm audit: no blocking high/critical advisories (${allowed} allowlisted-only finding(s) ignored).`);
          '
        env:
          ALLOWLIST: GHSA-gv7w-rqvm-qjhr
