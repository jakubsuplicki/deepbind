name: Dependency Audit

# Scans Python + npm dependencies for known CVEs. No auto-bumps, no PRs.
# Fails the build only on HIGH / CRITICAL findings so low-severity noise in
# deep transitive deps doesn't block merges.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Daily at 06:00 UTC — picks up newly published advisories against the
    # current pinned dependencies without requiring a code change.
    - cron: '0 6 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────
  # Backend — pip-audit against installed venv
  # ─────────────────────────────────────────────
  pip-audit:
    name: Backend — pip-audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: |
            backend/requirements.txt
            backend/overrides.txt

      - name: Install dependencies into isolated venv (with overrides)
        # uv venv does NOT include pip as a package (unlike python -m venv).
        # Override forces python-dotenv 1.2.2, eliminating CVE-2026-28684
        # from litellm's transitive ==1.0.1 pin. Result: a clean runtime
        # venv with every app dep installed and pip absent.
        env:
          VIRTUAL_ENV: /tmp/jarvis-venv
        run: |
          uv venv $VIRTUAL_ENV
          uv pip install --override overrides.txt -r requirements.txt

      - name: Install pip-audit
        run: uv pip install --system pip-audit

      - name: Run pip-audit (fail on ANY runtime vulnerability)
        # --path reads installed package metadata via importlib.metadata;
        # pip's resolver is never invoked. uv venvs exclude pip itself, so
        # CVE-2026-3219 (pip 26.0.1, no upstream patch) is correctly absent.
        # Strict mode: any known CVE in the runtime dep tree fails the build.
        # No --ignore-vuln allowlist — fix the dep if a finding appears.
        run: pip-audit --path /tmp/jarvis-venv --vulnerability-service osv --desc --strict

  # ─────────────────────────────────────────────
  # Frontend — npm audit against package-lock.json
  # ─────────────────────────────────────────────
  npm-audit:
    name: Frontend — npm audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Run npm audit (fail on HIGH / CRITICAL)
        # --audit-level=high: exit non-zero only for high/critical findings.
        # --omit=dev: ignore devDependencies — they don't ship to users.
        run: npm audit --audit-level=high --omit=dev
